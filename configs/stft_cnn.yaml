model:
  name: stft_cnn
  num_classes: 24
  channels: [32, 64, 128]
  classifier_hidden_dim: 256
  dropout: 0.3
  stft_n_fft: 128
  stft_hop_length: 32
  stft_window: hann
  stft_output: log_power
  stft_backend: torch

training:
  epochs: 50
  batch_size: 256
  lr: 0.001
  optimizer: adamw
  weight_decay: 0.0001
  amp: true
  num_workers: 4
  pin_memory: true
  grad_clip: 1.0
  early_stopping_patience: 8
  save_every: 5

runtime:
  device: cuda
  scan_chunk_size: 8192
